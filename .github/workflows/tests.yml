name: tests
on:
  push: { branches: [main] }
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --user pyyaml
      # Plain-script tests, one file per module (no framework — see tests/*.py).
      - run: |
          rc=0
          for t in tests/test_*.py; do
            echo "── $t"
            python3 "$t" || rc=1
          done
          exit $rc
