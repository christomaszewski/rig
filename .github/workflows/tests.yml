name: tests
on:
  push: { branches: [main] }
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --user pyyaml
      # Plain-script tests, one file per module (no framework — see tests/*.py).
      - run: |
          rc=0
          for t in tests/test_*.py; do
            echo "── $t"
            python3 "$t" || rc=1
          done
          exit $rc
      # The bundled zenoh-router template is the reference implementation of the launcher contract —
      # hold it to the contract it exemplifies, on both paths (default, and inline router_config).
      - name: certify the zenoh-router template
        run: ./rig certify --repo templates/zenoh-router --config templates/zenoh-router/config/zenoh-router.example.yaml
      - name: certify the template's router_config path
        run: |
          printf 'service: zenoh-router\nname: zr\nrouter_config:\n  scouting: {multicast: {enabled: false}}\n' > /tmp/zr.yaml
          ./rig certify --repo templates/zenoh-router --config /tmp/zr.yaml
      - name: certify the ros2-bag-logger template
        run: ./rig certify --repo templates/ros2-bag-logger --config templates/ros2-bag-logger/config/ros2-bag-logger.example.yaml
      - name: certify the ros1-bag-logger template
        run: ./rig certify --repo templates/ros1-bag-logger --config templates/ros1-bag-logger/config/ros1-bag-logger.example.yaml
