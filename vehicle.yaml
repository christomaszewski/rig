# vehicle.yaml — which sensors THIS machine runs, plus fleet-wide ROS settings.
#
# `rig` loops over `sensors` in `order` (ascending for up = producers first; reversed for down) and
# delegates each to its service's `<service>-up` launcher. Disable a sensor with `enabled: false`
# instead of deleting its config. Instance `name` MUST be unique across the vehicle — it keys the
# compose project, external volumes, and ROS namespace.
vehicle: orin-dev
vehicle_id: 1                  # identity; decides the ROS domain (override via ros.domain_id) + exported as VEHICLE_ID

ros:
  # domain_id: 0               # defaults to vehicle_id; uncomment to override
  rmw: rmw_zenoh_cpp           # one RMW across every stack; rmw_zenoh needs a zenoh-router in infra: (below)
  distro: lyrical

# Where stacks pull images from (fleet-wide). Empty = local images (dev). Set to a registry the machine
# can reach (e.g. a local registry on the dev box for offline vehicles); rig exports it as
# RIG_IMAGE_REGISTRY and each service's compose prefixes its own repo:tag. `rig bake` pins digests on top.
images:
  registry: ""                 # e.g. devbox:5000  -> RIG_IMAGE_REGISTRY (composes prefix their repo)
  tag: ""                      # e.g. jp7 (the Orin's JetPack) -> RIG_IMAGE_TAG; platform-specific composes
                               #   pull <repo>:<tag>. rig build defaults its --tag to this.

# Host dir for recordings/logs/outputs, exported as RIG_DATA_DIR; stacks write under it (an absolute host
# path, so bake leaves it literal instead of relativizing outputs into the artifact). e.g. /data
data_dir: ""

# infra: shared vehicle-wide services, brought up FIRST (and torn down last). The zenoh router (one per
# vehicle) lives here for rmw_zenoh; omit it (or enabled: false) for a DDS RMW or a ROS-less vehicle.
infra:
  - { name: zenoh-router, service: zenoh-router, config: config/infra/zenoh-router.yaml, enabled: true, order: 0 }

sensors:
  - { name: gnss_primary, service: novatel,     config: config/sensors/gnss_primary.yaml, enabled: true, order: 10 }
  - { name: ins_main,     service: sbg,         config: config/sensors/ins_main.yaml,     enabled: true, order: 20 }
  - { name: cam_front,    service: camera-service, config: config/sensors/cam_front.yaml,     enabled: true, order: 30 }
