# rig descriptor for the vehicle's shared Zenoh router (infra tier — rig brings it up FIRST).
service: zenoh-router
launcher: zenoh-router-up
verbs:
  up: "up -d"
  down: "down"
  status: "ps"
  logs: "logs"
  config: "config"
ros_distro: lyrical
# The router uses a third-party image (no build) — `rig build --registry <host>` mirrors it into the
# registry so an offline vehicle can pull it. Change this if you point ZENOH_ROUTER_IMAGE at a ROS image.
mirror:
  - eclipse/zenoh:latest
launch_surface:
  - zenoh-router-up
  - docker/compose.deploy.yaml
