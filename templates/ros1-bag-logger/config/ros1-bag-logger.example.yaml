# Drop into a ROS 1 deployment as config/infra/ros1-bag-logger.yaml and add it to vehicle.yaml `infra:`
# with an order just above the roscore so it records from the start. Records the ROS 1 telemetry graph to
# ${RIG_DATA_DIR}/bags/<name>/<name>_<date>.bag; image topics excluded by default. Same schema as the ROS 2
# logger (storage is ignored — ROS 1 bags are .bag; compression is lz4|bz2).
service: ros1-bag-logger
name: bag_logger

record:
  mode: exclude            # all | allow | exclude
  topics: []               # allow: exact topic names; exclude: regex patterns to drop
  exclude_images: true     # also drop image topics (default true)
  # exclude_images_regex: '.*/image_raw(/.*)?$'

output:
  subdir: bags             # -> ${RIG_DATA_DIR}/bags/<name>/...
  compression: none        # none | lz4 | bz2
  split_duration_s: 600    # roll to a new file every N seconds (0 = no time split)
  max_size_mb: 0           # also roll at N MB (0 = no size split)

# services: []             # FUTURE: also record service calls (not implemented yet — this key is ignored)
